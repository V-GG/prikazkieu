<!-- ============================================================== -->
<!-- Kindle-like paginator styles. Kept next to the script at the   -->
<!-- bottom of <body>, outside <head>. All rules are keyed off the  -->
<!-- html.pgn-on class, so removing that class restores the         -->
<!-- original scrolling page.                                       -->
<!-- ============================================================== -->
<style id="reader-paginator-style">
    html.pgn-on, html.pgn-on body { overflow: hidden !important; height: 100%;
      background: #fdfbf6 !important; }

    /* Site chrome hidden with CSS only — nothing is removed from the DOM. */
    html.pgn-on #header,
    html.pgn-on .book-cover,
    html.pgn-on .tale-leftbar,
    html.pgn-on .circular-counter,
    html.pgn-on .entry-content .donation-block,
    html.pgn-on .entry-content .credit,
    html.pgn-on .entry-content form,
    html.pgn-on .entry-content .share-buttons { display: none !important; }

    /* The existing .entry-content becomes the page window. position:fixed
       lifts it out of the theme layout, so parent widths/paddings of
       #page / #main / article / .tlb-wrapper stop mattering. */
    html.pgn-on #main article .entry-content { position: fixed !important;
      top: 58px; bottom: 44px;
      left: 24px; right: 24px;
      width: auto !important; max-width: none !important;
      margin: 0 !important; padding: 0 !important;
      overflow: hidden !important; z-index: 99999; }

    /* The existing .container becomes the column flow. Each column is one
       screen wide; the whole flow slides via --pgn-offset. */
    html.pgn-on #main article .entry-content .container {
      height: 100% !important; box-sizing: border-box;
      width: var(--pgn-pagew) !important; max-width: none !important;
      margin: 0 !important; padding: 6px 0 !important;
      column-width: var(--pgn-pagew); column-gap: 48px; column-fill: auto;
      transform: translate3d(var(--pgn-offset, 0px), 0, 0);
      transition: transform 220ms ease-out; will-change: transform;
      font-family: Georgia, "Times New Roman", serif; color: #2b2620;
      font-size: 19px; line-height: 1.65; }

    html.pgn-on .entry-content .container p { margin: 0 0 0.9em 0;
      text-align: justify; -webkit-hyphens: auto; hyphens: auto; }

    /* Keep illustrations whole on a page and sized to fit. */
    html.pgn-on .entry-content .container figure,
    html.pgn-on .entry-content .container .figure { break-inside: avoid;
      margin: 0.6em 0; }
    html.pgn-on .entry-content .container img { max-width: 100%;
      height: auto !important; max-height: 62vh; object-fit: contain;
      display: block; margin: 0 auto; }
    html.pgn-on .entry-content .container .dropcap img { max-height: none;
      display: inline; }

    /* Reader chrome (lives in <body>, outside <main><article>). */
    #pgn-titlebar { position: fixed; top: 0; left: 24px;
      right: 24px; height: 58px; z-index: 99999;
      display: flex; flex-direction: column; justify-content: center;
      font-family: Georgia, serif; -webkit-user-select: none; user-select: none; }
    #pgn-titlebar .t { font-size: 15px; color: #2b2620; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; }
    #pgn-titlebar .w { font-size: 11px; font-style: italic; color: #8a7f6f; }
    #pgn-pageno { position: fixed; bottom: 12px; left: 0; right: 0;
      z-index: 99999; text-align: center; font: 12px/1 Georgia, serif;
      color: #8a7f6f; letter-spacing: 0.08em;
      -webkit-user-select: none; user-select: none; }

    /* Page-turn flip. On nextPage/previousPage we clone the current
       .entry-content, freeze the clone at the outgoing page's offset, and
       rotate the whole clone in 3D around its trailing edge like a real
       page turning over. The real page underneath has already jumped to
       its new position, so it's revealed the instant the flap turns
       edge-on and its backface disappears (backface-visibility: hidden). */
    html.pgn-on body { perspective: 1600px; }

    html.pgn-on #main article .entry-content.pgn-flap { z-index: 100000;
      background: #fdfbf6; box-shadow: 0 12px 34px rgba(43,38,32,0.4);
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      will-change: transform; pointer-events: none; }
    .pgn-flap.next { transform-origin: 0% 50%; }
    .pgn-flap.prev { transform-origin: 100% 50%; }
    .pgn-flap .pgn-shade { position: absolute; inset: 0; z-index: 2;
      opacity: 0; background: rgba(20,16,10,0.45); }
</style>

<script id="reader-paginator">
    (function () {
      'use strict';

      if (window.nextPage) return; // already installed

      // -------------------------------------------------------------- settings
      // GAP, TOP_BAR, BOTTOM_BAR and MARGIN_X must stay in sync with the
      // values in #reader-paginator-style above (column-gap: 48px, top: 58px,
      // bottom: 44px, left/right: 24px). Only GAP is used in the math below.
      var GAP = 48;              // must equal column-gap in the stylesheet
      var SWIPE_THRESHOLD = 40;  // px

      var page = 0;    // 0-based current page
      var total = 1;   // total pages
      var step = 0;    // pageWidth + GAP

      // ------------------------------------------------- locate story (READ ONLY)
      // The article's DOM is never moved, wrapped, or rewritten. Pagination is
      // done entirely by the static stylesheet above, applied *onto* the
      // existing elements once the pgn-on class is set on <html>:
      //   .entry-content            -> becomes the fixed, screen-sized "window"
      //   .entry-content .container -> becomes a horizontal CSS-column flow
      // The current page offset lives in a CSS variable on <html>, so not even
      // an inline style is written inside <main><article>.
      var article = document.querySelector('#main article');
      var entry = document.querySelector('#main article .entry-content');
      var flow = document.querySelector('#main article .entry-content .container');
      if (!article || !entry || !flow) {
        console.warn('[paginator] story container not found');
        return;
      }
      var root = document.documentElement;
      var titleText = (article.querySelector('h1') || {}).textContent || document.title;
      var writerText = (article.querySelector('.writer') || {}).textContent || '';

      // Reader chrome is appended to <body>, never inside the article.
      var titleBar = document.createElement('div');
      titleBar.id = 'pgn-titlebar';
      titleBar.innerHTML = '<div class="t"></div><div class="w"></div>';
      titleBar.querySelector('.t').textContent = titleText.trim();
      titleBar.querySelector('.w').textContent = writerText.trim();
      var pageNo = document.createElement('div');
      pageNo.id = 'pgn-pageno';
      document.body.appendChild(titleBar);
      document.body.appendChild(pageNo);

      root.classList.add('pgn-on');

      // The ONE concession inside the article: lazy images sitting on off-screen
      // pages never intersect the viewport, so they would never load and the
      // page count would be wrong. Flipping the attribute to eager is the
      // minimal fix; the content and structure stay untouched. (If you can drop
      // loading="lazy" server-side, you can delete this block.)
      flow.querySelectorAll('img[loading="lazy"]').forEach(function (img) {
        img.loading = 'eager';
      });

      // ------------------------------------------------------------ pagination
      function measure() {
        var pageW = entry.clientWidth;
        step = pageW + GAP;
        root.style.setProperty('--pgn-pagew', pageW + 'px');
        // n columns occupy n*pageW + (n-1)*GAP  =>  n = (scrollWidth + GAP) / step
        total = Math.max(1, Math.round((flow.scrollWidth + GAP) / step));
      }

      function render() {
        root.style.setProperty('--pgn-offset', (-page * step) + 'px');
        pageNo.textContent = (page + 1) + ' / ' + total;
      }

      function goToPage(n) {
        var target = Math.min(Math.max(0, n | 0), total - 1);
        var moved = target !== page;
        page = target;
        render();
        return moved;
      }

      // Page flip: clone the current .entry-content, freeze the clone on the
      // outgoing page, and rotate the clone in 3D around its trailing edge —
      // a physical page turn, not a slide. The real flow underneath (see
      // goToPage/render above) has already moved to the new page, so it's
      // sitting there ready the moment the flap turns edge-on and vanishes
      // (backface-visibility: hidden means nothing renders past ~90deg).
      var FLIP_MS = 460;
      var flipping = false;

      function turnPage(direction, fromPage) {
        if (flipping || typeof anime === 'undefined') return; // no anime.js — plain CSS slide still applies

        var flap = entry.cloneNode(true);
        flap.removeAttribute('id');
        flap.classList.add('pgn-flap', direction);

        var flapFlow = flap.querySelector('.container');
        if (flapFlow) {
          // Freeze the clone on the page it was showing before the turn —
          // otherwise it would inherit the live --pgn-offset var and jump
          // to the destination page along with the real flow.
          flapFlow.style.transition = 'none';
          flapFlow.style.transform = 'translate3d(' + (-fromPage * step) + 'px,0,0)';
        }

        var shade = document.createElement('div');
        shade.className = 'pgn-shade';
        flap.appendChild(shade);
        article.appendChild(flap);

        flipping = true;
        var toAngle = direction === 'next' ? 110 : -110;
        anime({
          targets: flap,
          rotateY: [0, toAngle],
          duration: FLIP_MS,
          easing: 'easeInQuart',
          complete: function () {
            flap.remove();
            flipping = false;
          }
        });
        anime({
          targets: shade,
          opacity: [0, 0.5],
          duration: FLIP_MS * 0.6,
          easing: 'easeInQuad'
        });
      }

      function nextPage() {
        var from = page;
        var moved = goToPage(page + 1);
        if (moved) turnPage('next', from);
        return moved;
      }
      function previousPage() {
        var from = page;
        var moved = goToPage(page - 1);
        if (moved) turnPage('prev', from);
        return moved;
      }

      // Re-measure while keeping the reader's place (rotation, late images).
      function relayout() {
        var progress = total > 1 ? page / (total - 1) : 0;
        measure();
        page = Math.round(progress * (total - 1));
        render();
      }

      // ----------------------------------------------------------- interaction
      // Listeners sit on document — nothing is attached inside the article.
      // Tap zones: left 30% = back, right 30% = forward (classic e-reader).
      document.addEventListener('click', function (e) {
        var x = e.clientX / window.innerWidth;
        if (x < 0.3) previousPage();
        else if (x > 0.7) nextPage();
      });

      // Horizontal swipe.
      var tx = null, ty = null;
      document.addEventListener('touchstart', function (e) {
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
      }, { passive: true });
      document.addEventListener('touchend', function (e) {
        if (tx === null) return;
        var dx = e.changedTouches[0].clientX - tx;
        var dy = e.changedTouches[0].clientY - ty;
        tx = ty = null;
        if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
          if (dx < 0) { nextPage(); } else { previousPage(); }
        }
      }, { passive: true });
      // Kill any native scrolling inside the reader.
      document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

      // Arrow keys — convenient when testing in a desktop browser.
      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowRight') nextPage();
        if (e.key === 'ArrowLeft') previousPage();
      });

      // Rotation / window resize.
      var resizeTimer = null;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(relayout, 150);
      });

      // Images that finish loading after boot can shift the page count —
      // re-measure once everything (images, CSS, web fonts) has arrived.
      flow.querySelectorAll('img').forEach(function (img) {
        if (!img.complete) {
          img.addEventListener('load', relayout, { once: true });
          img.addEventListener('error', relayout, { once: true });
        }
      });
      window.addEventListener('load', relayout);

      // ------------------------------------------------------------ public api
      window.nextPage = nextPage;
      window.previousPage = previousPage;
      window.goToPage = goToPage;
      window.getCurrentPage = function () { return page; };
      window.getPageCount = function () { return total; };
      window.isLastPage = function () { return page === total - 1; };

      // ------------------------------------------------------------------ boot
      measure();
      render();
    })();
</script><div id="pgn-titlebar"></div><div id="pgn-pageno"></div>
